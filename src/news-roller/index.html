<!DOCTYPE html>
<html lang="it">
    <head>
        <title>news-roller CE</title>
        <meta charset="utf-8">
        <script src="./news-roller.js" type="module"></script>
    </head>
    <body>
        <style>
            @keyframes DefaultAppear
            {
                0% {
                    filter: opacity(0%);
                    transform: scale(0.8);
                }

                to {
                    filter: opacity(100%);
                    transform: scale(1);
                }
            }

            @keyframes DefaultDisappear
            {
                0% {
                    filter: opacity(100%);
                    transform: scale(1);
                }

                99% {
                    transform: scale(0.8);
                }
                100% {
                    filter: opacity(0%);
                    transform: scale(0);
                }
            }

            news-roller
            {
                width: 600px;
                height: 400px;
                outline: 2px solid green;
            }

            news-roller [slot="screen"]
            {
                animation: DefaultDisappear 500ms;
                animation-timing-function: ease-out;
                animation-fill-mode: both;
            }
            news-roller [slot="screen"].show
            {
                animation-name: DefaultAppear;
            }
        </style>

        <h1>News Roller</h1>
        <h3>An easy-to-use cinema-like carousel of news with big media and side tabs.</h3>
        <news-roller id="news1">
            <div slot="label">Titolo 1</div>
            <img slot="screen" src="../../resources/pic1.jpg" alt="Pic 1" />
            
            <div slot="label">Titolo 2</div>
            <img slot="screen" src="../../resources/pic2.jpg" alt="Pic 2" />
            
            <div slot="label">Titolo 3</div>
            <news-roller slot="screen">
                <div slot="label">Inner 1</div>
                <img slot="screen" src="../../resources/pic7.jpg" alt="Pic 7" />

                <div slot="label">Inner 2</div>
                <img slot="screen" src="../../resources/pic3.jpg" alt="Pic 3" />
            </news-roller>
            
            <div slot="label">Titolo 4</div>
            <img slot="screen" src="../../resources/pic4.jpg" alt="Pic 4" />
        </news-roller>
    </body>
</html>
